name: 반도체 시그널 알림

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  send-signal:
    runs-on: ubuntu-latest
    steps:
      - name: 텔레그램 전송
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, os
          token = "${{ secrets.BOT_TOKEN }}"
          chat = "${{ secrets.CHAT_ID }}"
          msg = "반도체 시그널 체크 07:00\n\n1차 핵심 트리거\n- HBM 주문 둔화\n- 엔비디아 가이던스 하향 ⚡\n- DRAM 가격 악화\n- SMH/SOXX 추세 훼손 ⚡\n- 외국인 반도체 대량매도\n\n2차 보강 트리거\n- TSMC 월매출 둔화\n- 한국 반도체 수출 둔화\n- AI capex 둔화\n- 장비주 주문 둔화\n- 메모리 재고 증가\n\n⚡ 1개라도 발동시 즉시 청산 검토"
          data = json.dumps({"chat_id": chat, "text": msg}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req)
          print("완료")
          PYEOF
