name: 반도체 시그널 알림

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  send-signal:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
    steps:
      - name: 텔레그램 전송
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="반도체 시그널 체크 07:00%0A%0A1차 핵심 트리거%0A- HBM 주문 둔화%0A- 엔비디아 가이던스 하향%0A- DRAM 가격 악화%0A- SMH/SOXX 추세 훼손%0A- 외국인 대량매도%0A%0A2차 보강 트리거%0A- TSMC 월매출 둔화%0A- 한국 반도체 수출 둔화%0A- AI capex 둔화%0A- 장비주 주문 둔화%0A- 메모리 재고 증가"
